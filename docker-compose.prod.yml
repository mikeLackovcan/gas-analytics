services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gas-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - DATA_DIR=/data
      - DB_URL=duckdb:////data/gas.duckdb
    volumes:
      - gas-data:/data
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  caddy:
    image: caddy:2-alpine
    container_name: gas-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - backend

volumes:
  gas-data:
  caddy-data:
  caddy-config:
